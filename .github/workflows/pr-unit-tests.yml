name: C++ Conan CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cpp-conan-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conan-create:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CONAN_REMOTE_URL: ${{ secrets.CONAN_REMOTE_URL }}
      CONAN_LOGIN_USERNAME: ${{ secrets.CONAN_LOGIN_USERNAME }}
      CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc-14 \
            g++-14 \
            cmake \
            ninja-build \
            graphviz \
            crudini

      - name: Set gcc-14 as default
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 10
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 10

      - name: Setup Conan client
        uses: conan-io/setup-conan@v1
        with:
          version: "2.*"
          use_venv: true

      - name: Detect Conan profile
        run: |
          conan profile detect --force
          crudini --set ~/.conan2/profiles/default settings compiler.cppstd 20

      - name: Restore Conan cache
        id: conan-cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan2-cppstd20-gcc14-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-conan2-cppstd20-gcc14-
            ${{ runner.os }}-conan2-cppstd20-

      - name: Login private Conan remote (optional)
        if: env.CONAN_REMOTE_URL != '' && env.CONAN_LOGIN_USERNAME != '' && env.CONAN_PASSWORD != ''
        run: |
          conan remote add org "$CONAN_REMOTE_URL" --force
          conan remote login org "$CONAN_LOGIN_USERNAME" --password "$CONAN_PASSWORD"
          conan remote list

      - name: Build and test package
        run: conan create . --build=missing -s compiler.version=14

      - name: Prune Conan cache before save
        if: steps.conan-cache.outputs.cache-hit != 'true'
        # actions/cache@v4 saves cache in its post-job hook when this job succeeds.
        # Prune first so the persisted ~/.conan2 is smaller and excludes temp/build/source artifacts.
        run: conan cache clean "*" --source --build --download --temp
